openapi: '3.0.1'
info:
  title: invoice management system – purchase invoices, refunds and supplies
  description: Endpoints for managing purchase invoices, refunds, and supplies.
  version: 1.0.0

servers:
  - url: 'http://localhost:8080/invoice-management-system/api/'
    description: local server

paths:

  /v1/purchase-invoices:
    post:
      tags:
        - PurchaseInvoices
      summary: Create a new purchase invoice
      description: Creates a new purchase invoice with a product name. Items can be added separately.
      operationId: createPurchaseInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/purchaseInvoice'
      responses:
        '201':
          description: Purchase invoice created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/purchaseInvoice'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'

    get:
      tags:
        - PurchaseInvoices
      summary: Get all purchase invoices
      operationId: getAllPurchaseInvoices
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/purchaseInvoice'

  /v1/purchase-invoices/{id}/items:
    post:
      tags:
        - PurchaseInvoices
      summary: Add an item to a purchase invoice
      description: Adds a new purchase invoice item (with an optional PDF document) to the given purchase invoice.
      operationId: addPurchaseInvoiceItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                itemData:
                  $ref: '#/components/schemas/purchaseInvoiceItem'
                pdf:
                  type: string
                  format: binary
              required:
                - itemData
      responses:
        '201':
          description: Item added successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/purchaseInvoice'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'
        '404':
          description: Purchase invoice not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'

  /v1/purchase-invoices/{id}/items/{itemId}:
    delete:
      tags:
        - PurchaseInvoices
      summary: Remove an item from a purchase invoice
      description: Removes a purchase invoice item from the given purchase invoice. Returns 404 if the invoice or item is not found, or 409 if the item does not belong to the given invoice.
      operationId: deletePurchaseInvoiceItem
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the purchase invoice.
          schema:
            type: integer
            format: int32
        - name: itemId
          in: path
          required: true
          description: The id of the purchase invoice item to remove.
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Purchase invoice item removed successfully.
        '404':
          description: Purchase invoice or item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'
        '409':
          description: Item does not belong to the given purchase invoice.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'

  /v1/purchase-invoices/{id}/items/{itemId}/pdf:
    get:
      tags:
        - PurchaseInvoices
      summary: Download the PDF document of a purchase invoice item
      operationId: getPurchaseInvoiceItemPdf
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: PDF not found

  /v1/refunds:
    post:
      tags:
        - Refunds
      summary: Add a refund
      description: Creates a new refund entry with a money value and year.
      operationId: createRefund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/refund'
      responses:
        '201':
          description: Refund created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/refund'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'

    get:
      tags:
        - Refunds
      summary: Get all refunds
      operationId: getAllRefunds
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/refund'

  /v1/refunds/{id}:
    delete:
      tags:
        - Refunds
      summary: Remove a refund
      description: Deletes the refund with the given id.
      operationId: deleteRefund
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the refund.
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Refund removed successfully.
        '404':
          description: Refund not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'

  /v1/supplies:
    post:
      tags:
        - Supplies
      summary: Add a supply
      description: Creates a new supply entry with an optional PDF document, a money value, a date, and a product name.
      operationId: createSupply
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                supplyData:
                  $ref: '#/components/schemas/supply'
                pdf:
                  type: string
                  format: binary
              required:
                - supplyData
      responses:
        '201':
          description: Supply created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/supply'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'

    get:
      tags:
        - Supplies
      summary: Get all supplies
      operationId: getAllSupplies
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/supply'

  /v1/supplies/{id}:
    delete:
      tags:
        - Supplies
      summary: Remove a supply
      description: Deletes the supply with the given id.
      operationId: deleteSupply
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the supply.
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Supply removed successfully.
        '404':
          description: Supply not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'

  /v1/supplies/{id}/pdf:
    get:
      tags:
        - Supplies
      summary: Download the PDF document of a supply
      operationId: getSupplyPdf
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Supply or document not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseMessage'

components:
  schemas:
    purchaseInvoice:
      type: object
      description: A purchase invoice containing a product name, a computed total price, and a list of items.
      properties:
        id:
          type: integer
          format: int32
          description: Unique identifier for the purchase invoice.
        productName:
          type: string
          description: Name of the purchased product.
        totalPrice:
          type: number
          format: double
          description: Total price computed from all items.
          readOnly: true
        items:
          type: array
          description: List of purchase invoice items.
          readOnly: true
          items:
            $ref: '#/components/schemas/purchaseInvoiceItem'
      required:
        - productName

    purchaseInvoiceItem:
      type: object
      description: A single item entry within a purchase invoice.
      properties:
        id:
          type: integer
          format: int32
          description: Unique identifier for the purchase invoice item.
        purchaseType:
          type: string
          enum:
            - DISPLAY
            - CASE
            - BOOSTER
          description: Type of item purchased.
        amount:
          type: integer
          format: int32
          description: Quantity purchased.
        price:
          type: number
          format: double
          description: Price per unit.
        invoiceDate:
          type: string
          format: date
          description: Date of the invoice.
      required:
        - purchaseType
        - amount
        - price
        - invoiceDate

    refund:
      type: object
      description: A refund entry with a money value and a year.
      properties:
        id:
          type: integer
          format: int32
          description: Unique identifier for the refund.
        value:
          type: number
          format: double
          description: The refunded money value.
        year:
          type: integer
          format: int32
          description: The year of the refund.
      required:
        - value
        - year

    supply:
      type: object
      description: A supply entry with an optional PDF document, a money value, a date, and a product name.
      properties:
        id:
          type: integer
          format: int32
          description: Unique identifier for the supply.
        value:
          type: number
          format: double
          description: The money value of the supply.
        supplyDate:
          type: string
          format: date
          description: The date of the supply.
        product:
          type: string
          description: The name of the supplied product.
      required:
        - value
        - supplyDate
        - product

    responseMessage:
      type: object
      properties:
        message:
          type: string
          example: CSV schema validation failed. / CSV file import was successful. / Internal Server Error.

openapi: '3.0.1'
info:
  title: invoice management system – ZUGFeRD service
  description: Endpoints for generating and storing ZUGFeRD-compliant invoices.
  version: 1.0.0

servers:
  - url: 'http://localhost:8080/invoice-management-system/api/'
    description: local server

paths:

  /v1/invoices/zugferd/{cardmarketExternalOrderId}:
    post:
      tags:
        - zugferd
      summary: Generate and store a ZUGFeRD invoice
      description: >
        Generates a ZUGFeRD-compliant invoice (PDF with embedded XML) for the given
        order, persists it in the database, and returns the stored invoice data.
        Returns 409 if a ZUGFeRD invoice already exists for this order.
      operationId: createZugferdInvoice
      parameters:
        - name: cardmarketExternalOrderId
          in: path
          required: true
          description: The external order id.
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: ZUGFeRD invoice created and stored successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zugferdInvoice'
        '404':
          description: Order not found.
        '409':
          description: ZUGFeRD invoice already exists for this order.
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zugferdErrorResponse'

  /v1/invoices/zugferd/{id}:
    get:
      tags:
        - zugferd
      summary: Get a stored ZUGFeRD invoice by id
      description: Returns the stored ZUGFeRD invoice data for the given id.
      operationId: getZugferdInvoiceById
      parameters:
        - name: id
          in: path
          required: true
          description: The id of the ZUGFeRD invoice.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: ZUGFeRD invoice found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/zugferdInvoice'
        '404':
          description: ZUGFeRD invoice not found.

components:
  schemas:
    zugferdInvoice:
      type: object
      description: ZUGFeRD invoice associated with an order.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the ZUGFeRD invoice.
        orderId:
          type: integer
          format: int64
          description: External order id this invoice belongs to.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the invoice was created.
        invoicePdf:
          type: string
          format: byte
          nullable: true
          description: ZUGFeRD PDF content (PDF with embedded XML) as a base64-encoded byte array.
      required:
        - id
        - orderId
        - createdAt

    zugferdErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Internal server error occurred while generating the ZUGFeRD invoice.

openapi: '3.0.1'
info:
  title: Invoice Management System – Complete API
  description: >
    Master specification that combines all services of the Invoice Management
    System into a single OpenAPI document.
    The combined openapi.yml is generated from this master file by the Gradle
    task 'mergeOpenApiSpecs'. Do not edit openapi.yml directly; edit the
    individual service specs instead.
  version: 2.0.0

servers:
  - url: 'http://localhost:8080/invoice-management-system/api/'
    description: local server

paths:
  # Invoice-Management-System
  /v1/shift_groups:
    $ref: "./openapi_workplace_priorities.yaml#/paths/~1v1~1shift_groups"
  /v1/shift_group/{shiftGroupId}/priority_profile_items:
    $ref: "./openapi_workplace_priorities.yaml#/paths/~1v1~1shift_group~1{shiftGroupId}~1priority_profile_items"
  /v1/shift_group/{shiftGroupId}/priority_profiles:
    $ref: "./openapi_workplace_priorities.yaml#/paths/~1v1~1shift_group~1{shiftGroupId}~1priority_profiles"
  /v1/shift_group/{shiftGroupId}/priority_profile/{profileId}:
    $ref: "./openapi_workplace_priorities.yaml#/paths/~1v1~1shift_group~1{shiftGroupId}~1priority_profile~1{profileId}"
  /v1/shift_group/{shiftGroupId}/priority_profiles/by_date/{date}:
    $ref: "./openapi_workplace_priorities.yaml#/paths/~1v1~1shift_group~1{shiftGroupId}~1priority_profiles~1by_date~1{date}"
  /v1/shift_group/{shiftGroupId}/priority_profiles/by_date/for_automatic_planning/{date}:
    $ref: "./openapi_workplace_priorities.yaml#/paths/~1v1~1shift_group~1{shiftGroupId}~1priority_profiles~1by_date~1for_automatic_planning~1{date}"
  /v1/shift_group/{shiftGroupId}/report_xlsx:
    $ref: "./openapi_workplace_priorities.yaml#/paths/~1v1~1shift_group~1{shiftGroupId}~1report_xlsx"

    # E-Mail-System
  /v1/shift_group/{shiftGroupId}/planning_template:
    $ref: "./openapi_planning_template.yaml#/paths/~1v1~1shift_group~1{shiftGroupId}~1planning_template"

components:
  schemas:
    # Invoice-Management-System
    shift_group:
      $ref: "./openapi_workplace_priorities.yaml#/components/schemas/shift_group"
    priority_profile_item:
      $ref: "./openapi_workplace_priorities.yaml#/components/schemas/priority_profile_item"
    priority_profile:
      $ref: "./openapi_workplace_priorities.yaml#/components/schemas/priority_profile"
    workplace_priority:
      $ref: "./openapi_workplace_priorities.yaml#/components/schemas/workplace_priority"

    # E-Mail-System
    planning_template:
      $ref: "./openapi_planning_template.yaml#/components/schemas/planning_template"
